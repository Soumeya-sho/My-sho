<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>iPhone Shop</title>
   <link rel="stylesheet" href="style.css">
   <style>
      .products-container {
         display: flex;
         flex-wrap: wrap;
         justify-content: center;
         gap: 20px;
         padding: 40px 20px;
      }
      .product {
         border: 1px solid #eee;
         padding: 20px;
         text-align: center;
         width: 280px;
         border-radius: 15px;
         box-shadow: 0 4px 10px rgba(0,0,0,0.05);
         transition: 0.3s;
      }
      .product:hover { transform: translateY(-5px); }
      .product img {
         width: 100%;
         height: 250px;
         object-fit: contain;  
         margin-bottom: 15px;
      }
      .add-to-cart {
         background: #9e7a43;
         color: white;
         border: none;
         padding: 10px 20px;
         border-radius: 5px;
         cursor: pointer;
      }
     
      .cart-modal, .checkout-modal {
         display: none;
         position: fixed;
         top: 50%;
         left: 50%;
         transform: translate(-50%, -50%);
         background: white;
         padding: 30px;
         box-shadow: 0 0 30px rgba(0,0,0,0.2);
         z-index: 1000;
         border-radius: 20px;
         width: 90%;
         max-width: 400px;
      }
   </style>
</head>
<body>

   <nav class="navbar" style="display: flex; justify-content: space-around; align-items: center; padding: 20px; background: #fff; border-bottom: 1px solid #ddd;">
      <h1 style="color: #9e7a43; margin: 0;">iPhone Shop</h1>
      <button id="cart-btn" style="padding: 10px 20px; cursor: pointer;">السلة (<span id="cart-count">0</span>)</button>
   </nav>

   <div class="products-container">
      
      <div class="product">
         <img src="now/photo121.jpg" alt="iPhone 17 Pro">
         <h3>iPhone 17 Silver Pro</h3>
         <p><strike>$6500</strike> <span style="color: #d9534f; font-weight: bold;">$6300</span></p>
         <button class="add-to-cart" data-name="iPhone 17 Silver Pro" data-price="6300">إضافة للسلة</button>
      </div>

      
      <div class="product">
         <img src="now/333.png" alt="iPhone 17 Pro Max">
         <h3>iPhone 17 Silver Pro Max</h3>
         <p><strike>$7200</strike> <span style="color: #d9534f; font-weight: bold;">$6800</span></p>
         <button class="add-to-cart" data-name="iPhone 17 Silver Pro Max" data-price="6800">إضافة للسلة</button>
      </div>

     
      <div class="product">
         <img src="now/111.jpg" alt="iPhone 17 Orange">
         <h3>iPhone 17 Orange Pro</h3>
         <p><strike>$6200</strike> <span style="color: #d9534f; font-weight: bold;">$5800</span></p>
         <button class="add-to-cart" data-name="iPhone 17 Orange Pro" data-price="5800">إضافة للسلة</button>
      </div>

      
      <div class="product">
         <img src="now/222.jpg.JPG" alt="iPhone 17 Black">
         <h3>iPhone 17 Black Pro Max</h3>
         <p><strike>$5900</strike> <span style="color: #d9534f; font-weight: bold;">$5600</span></p>
         <button class="add-to-cart" data-name="iPhone 17 Black Pro Max" data-price="5600">إضافة للسلة</button>
      </div>
   </div>

   
   <div id="cart-modal" class="cart-modal">
      <h2>سلة التسوق</h2>
      <ul id="cart-items-list" style="list-style: none; padding: 0;"></ul>
      <hr>
      <p>المجموع الكلي: $<span id="cart-total">0</span></p>
      <button id="checkout-btn" style="background: #5cb85c; color: white; border: none; padding: 10px; width: 100%; margin-bottom: 10px; cursor: pointer;">الانتقال للدفع</button>
      <button id="close-cart" style="width: 100%; cursor: pointer;">إغلاق</button>
   </div>

   <!-- مودال الدفع -->
   <div id="checkout-modal" class="checkout-modal">
      <h2>بيانات الدفع</h2>
      <input type="text" placeholder="رقم البطاقة" style="width: 100%; margin-bottom: 10px; padding: 8px;">
      <div style="display: flex; gap: 10px; margin-bottom: 10px;">
         <input type="text" placeholder="MM/YY" style="width: 50%; padding: 8px;">
         <input type="text" placeholder="CVV" style="width: 50%; padding: 8px;">
      </div>
      <button style="background: #9e7a43; color: white; border: none; padding: 10px; width: 100%; cursor: pointer;">تأكيد الدفع</button>
      <button id="close-checkout" style="width: 100%; margin-top: 10px; cursor: pointer;">إلغاء</button>
   </div>

   <script src="script.js"></script>
</body>
</html>
